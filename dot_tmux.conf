# Prefer tmux's own terminfo (true color + clearer TERM than screen-256color)
set -g default-terminal "tmux-256color"
# Outer terminal true color (tmux 3.2+); harmless if outer TERM is unrecognized
set -sa terminal-features ",*:RGB"

# act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind -T copy-mode-vi "v" send -X begin-selection
bind -T copy-mode-vi "V" send -X rectangle-toggle
bind -T copy-mode-vi "y" send -X copy-selection-and-cancel

# act like GNU screen
unbind C-b
set -g prefix C-a
bind a send-prefix
bind C-a send-prefix
bind b send-prefix
bind C-b send-prefix

# create new windows/panes in same directory
bind c new-window -c "#{pane_current_path}"
bind "\"" split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# enable and disable keyboard input for panes
bind < select-pane -d \; display-message "input disabled"
bind > select-pane -e \; display-message "input enabled"

# size windows based on clients looking at that window
setw -g aggressive-resize on

# enable mouse control
set -g mouse on

# start window numbers at 1 to match keyboard order with tmux order
set -g base-index 1

# start pane numbers at 1 to match keyboard order with tmux order
setw -g pane-base-index 1

# easy resizing of panes
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# reenable automatic renaming for the current window
bind N setw automatic-rename on \; display-message "automatic rename enabled"

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# monitor windows for activity
setw -g monitor-activity on

# don't wait for escape sequences
set -sg escape-time 0

# display pane numbers for longer
set -g display-panes-time 2000

# Machine name for status bar (resolved once when config is sourced)
set -g @machine_name "#(if [ -f $HOME/.name ]; then cat $HOME/.name; else hostname -s; fi)"

set -g status-left-length 20
set -g status-left '#{?pane_input_off,#[fg=#ed8796],#[fg=#f5a97f]}[#[fg=#f5a97f]#S:#I.#P#{?pane_input_off,#[fg=#ed8796],#[fg=#f5a97f]}] '
set -g status-right '#[fg=#f5a97f]#{?client_prefix,#[fg=#ed8796],} %d %b %Y #[fg=#8aadf4]%I:%M %p #[fg=#a5adcb]#{@machine_name}'

# increase scrollback lines
set -g history-limit 65536

# keybinding to clear history
bind C-k clear-history \; display-message "history cleared"

# C-b ! breaks current pane into separate window
# join a pane/window from the current session into the current window
bind @ command-prompt -p "create pane from:" "join-pane -s ':%%'"

# reload the .tmux.conf file with Ctrl-r
bind C-r source-file ~/.tmux.conf \; display-message "configuration reloaded"

# toggle passthrough of prefix
bind P if-shell "[ \"$(tmux show-options -g prefix)\" = \"prefix C-a\" ]" '\
    set -g prefix C-b; display-message "passthrough enabled"; refresh-client -S; \
    ' '\
    set -g prefix C-a; display-message "passthrough disabled"; refresh-client -S; \
    '

#### color (Catppuccin Macchiato)
set -g status-style bg=#24273a,fg=#cad3f5
setw -g window-status-style fg=#a5adcb
setw -g window-status-current-style fg=#f5a97f
setw -g window-status-activity-style fg=#8aadf4
setw -g window-status-bell-style fg=#c6a0f6
set -g pane-border-style fg=#363a4f
set -g pane-active-border-style fg=#5b6078
set -g message-style bg=#24273a,fg=#f5a97f

# pane number display
set -g display-panes-active-colour #f5a97f
set -g display-panes-colour #8aadf4

# clock
setw -g clock-mode-colour #a6da95

# Allow local customization in ~/.tmux_local.conf
if-shell "[ -f ~/.tmux_local.conf ]" 'source ~/.tmux_local.conf'